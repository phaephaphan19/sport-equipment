
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบยืม–คืนอุปกรณ์กีฬา</title>
    <link rel="stylesheet" href="styleindex.css">
</head>
<body>
        <nav>
        <h1 class="logo">ระบบ<span class="blue">ยืม-คืน อุปกรณ์กีฬา</span></h1>
        <ul>
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="borrow.html">ระบบยืม-คืนอุปกรณ์</a></li>
            <li><a href="equipment.html">คลังอุปกรณ์</a></li>
        </ul>
    </nav>
    
<div class="container">
    <h1>🏀 ระบบยืม–คืนอุปกรณ์กีฬา</h1>

    <!-- ===== จัดการผู้ใช้งาน ===== -->
    <h2>👤 เพิ่มผู้ใช้งาน</h2>
    <form id="userForm">
        <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน" required>
        <button type="submit">บันทึกผู้ใช้</button>
    </form>

    

    <!-- ===== ยืมคืน ===== -->
    <h2>📋 บันทึกการยืมอุปกรณ์</h2>
    <form id="borrowForm">
        <select id="borrowUser" required><option value="">-- เลือกผู้ใช้งาน --</option></select>
        <select id="borrowEquipment" required><option value="">-- เลือกอุปกรณ์ --</option></select>
        <input type="number"
                id="borrowQty"
                placeholder="จำนวนที่ยืม"
                min="1"
                value="1"
                required>
        <input type="date" id="borrowDate" required>
        <button type="submit">บันทึกการยืม</button>
    </form>

    <!-- ===== สถานะอุปกรณ์ ===== -->
    <h2>📦 อุปกรณ์ที่ยืม</h2>
    <table>
        <thead>
            <tr>
                <th>ผู้ยืม</th>
                <th>อุปกรณ์</th>
                <th>จำนวน</th>
                <th>วันที่ยืม</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody id="borrowTable"></tbody>
    </table>
    <div id="borrowPagination" style="text-align:center;margin-top:10px;"></div>
    
   

    <!-- ===== ประวัติ ===== -->
    <h2>🕘 ประวัติการยืม–คืน</h2>

<button id="resetHistoryBtn" style="margin-bottom:15px; background:#ff4b2b;">
    🗑 รีเซตประวัติการยืม–คืน
</button>

<table>
    <thead>
        <tr>
            <th>ผู้ใช้</th>
            <th>อุปกรณ์</th>
            <th>จำนวน</th>
            <th>วันที่ยืม</th>
            <th>วันที่คืน</th>
            <th>สถานะ</th>
        </tr>
    </thead>
    <tbody id="historyTable"></tbody>
</table>
<div id="historyPagination" style="text-align:center;margin-top:10px;"></div>

<script src="scriptindex.js"></script>
<script src="script/user.js"></script>
<script src="script/borrow.js"></script>
<script src="script/equipment.js"></script>
</body>
</html>
